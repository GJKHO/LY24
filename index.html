<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Merge Defense</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <!-- Telegram Web App SDK：必须在其他脚本之前加载 -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="text/javascript">
        try {
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
            }
        } catch (e) { console.log('Telegram WebApp init failed:', e); }
    </script>
    <!-- Adsgram 广告 SDK -->
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <style>
        #tg-ad-layer {
            position: fixed;
            bottom: 16px;
            left: 16px;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
            pointer-events: none;
        }
        #tg-reward-btn {
            pointer-events: auto;
            font-size: 15px;
            padding: 10px 18px;
            background: linear-gradient(135deg, #00b4d8, #0096c7);
            color: #fff;
            border: none;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.5);
            cursor: pointer;
            display: none;
        }
        #tg-reward-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #tg-score-toast {
            pointer-events: none;
            font-size: 22px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 0 0 8px #000;
            display: none;
            animation: floatUp 1.2s ease forwards;
        }
        @keyframes floatUp {
            0%   { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-60px); }
        }
    </style>
  </head>
  <body>
    <div id="unity-container" style = "position: absolute; width: 100%; height: 100%; left: 0%; top: 0%;">
      <canvas id="unity-canvas" style = "position: absolute; width: 100%; height: 100%;"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>

    </div>
	

    <script>
      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      var warningBanner = document.querySelector("#unity-warning");

      // Shows a temporary message banner/ribbon for a few seconds, or
      // a permanent error message on top of the canvas if type=='error'.
      // If type=='warning', a yellow highlight color is used.
      // Modify or remove this function to customize the visually presented
      // way that non-critical warnings and error messages are presented to the
      // user.
      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/MergeDefense.loader.js";
      var config = {
        dataUrl: buildUrl + "/MergeDefense.data.unityweb",
        frameworkUrl: buildUrl + "/MergeDefense.framework.js.unityweb",
        codeUrl: buildUrl + "/MergeDefense.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "PivDev",
        productName: "Merge Defense",
        productVersion: "0.1",
        showBanner: unityShowBanner,
      };

      // By default Unity keeps WebGL canvas render target size matched with
      // the DOM size of the canvas element (scaled by window.devicePixelRatio)
      // Set this to false if you want to decouple this synchronization from
      // happening inside the engine, and you would instead like to size up
      // the canvas DOM size and WebGL render target sizes yourself.
      // config.matchWebGLToCanvasSize = false;

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:

        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        container.className = "unity-mobile";

        // To lower canvas resolution on mobile devices to gain some
        // performance, uncomment the following line:
        // config.devicePixelRatio = 1;

        canvas.style.width = "100%";
        canvas.style.height = "100%";

        //unityShowBanner('WebGL builds are not supported on mobile devices.');
      } else {
        // Desktop style: Render the game canvas in a window that can be maximized to fullscreen:

        canvas.style.width = "100%";
        canvas.style.height = "100%";
      }

      loadingBar.style.display = "block";

	  var myGameInstance = null;
	  
      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
		
		  myGameInstance = unityInstance;
          loadingBar.style.display = "none";
          //fullscreenButton.onclick = () => {
            //unityInstance.SetFullscreen(1);
          //};
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>

<script type="text/javascript">
  function loadLib(url,callback) {
      var script = document.createElement("script");
      script.async = false;
      script.src = url;
      script.addEventListener('load', function () {
          script.parentNode.removeChild(script);
          script.removeEventListener('load', arguments.callee, false);
          callback&&callback();
      }, false);
      document.body.appendChild(script);
  }
  


  loadLib("https://www.ooppgame.com/Bridge_Builder/sdk/ADManage_2028.js",function(){
    ADManageLaya.getInstance().slp(100,true);
  })



</script>

    <!-- ================= Adsgram 广告区 ================= -->
    <div id="tg-ad-layer">
        <div id="tg-score-toast">+200</div>
        <button id="tg-reward-btn" onclick="tgShowRewardAd()">📺 Watch Ad +200</button>
    </div>

    <script type="text/javascript">
    (function () {
        var REWARD_AMOUNT = 200;
        var AdController = null;
        var IntAdController = null;

        // 奖励回调：游戏脚本可覆盖此函数以真正加分（window.onAdsgramReward = fn）
        if (typeof window.onAdsgramReward !== 'function') {
            window.onAdsgramReward = function () {};
        }

        // 从 ID.txt 读取广告位 ID，格式 KEY=VALUE，每行一个
        function loadConfig(cb) {
            fetch('ID.txt?_=' + Date.now())
                .then(function (r) { return r.text(); })
                .then(function (text) {
                    var cfg = {};
                    text.split('\n').forEach(function (line) {
                        var parts = line.trim().split('=');
                        if (parts.length === 2) cfg[parts[0].trim()] = parts[1].trim();
                    });
                    cb(cfg);
                })
                .catch(function () { cb({}); });
        }

        function initAds(cfg) {
            if (!window.Adsgram) return;
            var rewardId = cfg['REWARD_BLOCK_ID'] || '';
            var intId    = cfg['INT_BLOCK_ID']    || '';
            try { if (rewardId) AdController    = window.Adsgram.init({ blockId: rewardId }); } catch (e) {}
            try { if (intId)    IntAdController = window.Adsgram.init({ blockId: intId });    } catch (e) {}

            document.getElementById('tg-reward-btn').style.display = 'block';
            startIntAdTimer();
        }

        function waitAndInit(cfg) {
            if (window.Adsgram) {
                initAds(cfg);
            } else {
                var sdkCheck = setInterval(function () {
                    if (window.Adsgram) { clearInterval(sdkCheck); initAds(cfg); }
                }, 300);
            }
        }

        loadConfig(function (cfg) { waitAndInit(cfg); });

        // 激励广告：看完 +200
        window.tgShowRewardAd = function () {
            if (!AdController) return;
            var btn = document.getElementById('tg-reward-btn');
            btn.disabled = true;
            AdController.show().then(function () {
                if (typeof window.onAdsgramReward === 'function') {
                    window.onAdsgramReward(REWARD_AMOUNT);
                }
                var toast = document.getElementById('tg-score-toast');
                toast.textContent = '+' + REWARD_AMOUNT;
                toast.style.display = 'block';
                toast.style.animation = 'none';
                setTimeout(function () {
                    toast.style.animation = 'floatUp 1.2s ease forwards';
                    setTimeout(function () { toast.style.display = 'none'; }, 1200);
                }, 20);
                // 60 秒冷却
                var cd = 60;
                btn.textContent = '⏳ ' + cd + 's';
                var cdTimer = setInterval(function () {
                    cd--;
                    if (cd <= 0) {
                        clearInterval(cdTimer);
                        btn.disabled = false;
                        btn.textContent = '📺 Watch Ad +' + REWARD_AMOUNT;
                    } else {
                        btn.textContent = '⏳ ' + cd + 's';
                    }
                }, 1000);
            }).catch(function () {
                btn.disabled = false;
            });
        };

        // 插屏广告：每 30 秒自动弹出
        var intAdInterval = null;
        function startIntAdTimer() {
            if (intAdInterval) clearInterval(intAdInterval);
            intAdInterval = setInterval(function () {
                if (!IntAdController) return;
                IntAdController.show().then(function () {}).catch(function () {});
            }, 30000);
        }
    })();
    </script>

  </body>
</html>
